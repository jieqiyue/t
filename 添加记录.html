<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  @keyframes cc-caret { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
</style>
</helmet>

<div style="width:max-content;min-width:100%;min-height:100vh;box-sizing:border-box;padding:48px;background:#E7E3DA;font-family:'Nunito','Noto Sans SC',-apple-system,sans-serif">

  <div style="max-width:680px;margin:0 auto 30px">
    <div style="font-size:12px;font-weight:800;letter-spacing:.22em;color:#B3A998;margin-bottom:8px">DAILY ACTIVITY LOG · 添加记录</div>
    <h1 style="margin:0 0 8px;font-size:30px;font-weight:800;color:#4A4540;letter-spacing:-.01em">更丰富的记录</h1>
    <p style="margin:0;font-size:14px;color:#8C8275;font-weight:500">点 + 后的记录面板新增：自定义一句话、选择心情、选择天气，连同事件分类一起，点「记下来」即完成。</p>
  </div>

  <div style="display:flex;gap:36px;align-items:flex-start;margin:0 auto;max-width:680px">

    <!-- 1 · 添加记录面板 -->
    <div style="display:flex;flex-direction:column;gap:13px;flex:none">
      <span style="font-size:12px;font-weight:700;color:#9A9081;letter-spacing:.03em;padding-left:8px">添加记录</span>
      <div style="width:300px;height:624px;background:#F6F3EC;border-radius:42px;box-shadow:0 22px 50px rgba(74,69,64,.16),0 6px 16px rgba(74,69,64,.06);overflow:hidden;position:relative;display:flex;flex-direction:column;flex:none;border:6px solid #fff;outline:1px solid rgba(120,110,100,.1)">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 22px 4px;flex:none">
          <span style="font-size:13px;font-weight:800;color:#4A4540">9:41</span>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="display:flex;align-items:flex-end;gap:1.5px;height:9px"><div style="width:2.5px;height:4px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:6px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:8px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:9px;background:#4A4540;border-radius:1px"></div></div>
            <div style="width:18px;height:9px;border:1px solid rgba(74,69,64,.5);border-radius:2px;padding:1px"><div style="width:70%;height:100%;background:#4A4540;border-radius:1px"></div></div>
          </div>
        </div>
        <div style="flex:1;position:relative;overflow:hidden">
          <div style="position:absolute;inset:0;background:rgba(60,55,50,.34)"></div>
          <div style="position:absolute;left:0;right:0;bottom:0;background:#FBF9F4;border-radius:28px 28px 0 0;padding:13px 20px 18px;box-shadow:0 -12px 44px rgba(50,46,42,.22);display:flex;flex-direction:column;gap:14px;max-height:96%">
            <div style="width:38px;height:4px;border-radius:999px;background:#DAD3C7;align-self:center;flex:none"></div>
            <div style="display:flex;align-items:center;justify-content:space-between;flex:none">
              <span style="font-size:17px;font-weight:800;color:#4A4540">记录此刻</span>
              <span style="font-size:11.5px;font-weight:600;color:#A89D8E">14:30 · 今天</span>
            </div>

            <!-- 一句话输入 -->
            <div style="background:#F2EEE5;border-radius:15px;padding:12px 13px;min-height:56px;flex:none">
              <span style="font-size:14px;font-weight:600;color:#4A4540;line-height:1.5">午后散步，晒到太阳很舒服<span style="display:inline-block;width:1.5px;height:14px;background:#A8B5A2;margin-left:1px;vertical-align:-2px;animation:cc-caret 1.1s steps(1) infinite"></span></span>
            </div>

            <!-- 事件分类 -->
            <div style="display:flex;flex-direction:column;gap:7px;flex:none">
              <span style="font-size:10.5px;font-weight:800;letter-spacing:.1em;color:#B3A998">分类</span>
              <div style="display:flex;gap:7px;flex-wrap:wrap">
                <span style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #ECE6DC;color:#8C8275;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px"><span style="width:6px;height:6px;border-radius:50%;background:#9FB0BE"></span>工作</span>
                <span style="display:inline-flex;align-items:center;gap:5px;background:#A8B5A2;color:#fff;font-size:12px;font-weight:800;padding:6px 13px;border-radius:999px;box-shadow:0 4px 12px rgba(168,181,162,.4)">生活</span>
                <span style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #ECE6DC;color:#8C8275;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px"><span style="width:6px;height:6px;border-radius:50%;background:#C9A9A0"></span>运动</span>
                <span style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #ECE6DC;color:#8C8275;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px"><span style="width:6px;height:6px;border-radius:50%;background:#C2B49C"></span>娱乐</span>
              </div>
            </div>

            <!-- 心情 -->
            <div style="display:flex;flex-direction:column;gap:7px;flex:none">
              <span style="font-size:10.5px;font-weight:800;letter-spacing:.1em;color:#B3A998">心情</span>
              <div style="display:flex;gap:8px;justify-content:space-between">
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><span style="width:38px;height:38px;border-radius:50%;background:#fff;border:1.5px solid #ECE6DC;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.5" cy="10" r="1.3" fill="#B0A695"/><circle cx="15.5" cy="10" r="1.3" fill="#B0A695"/><path d="M8 15.5q4 -2.5 8 0" stroke="#B0A695" stroke-width="1.6" stroke-linecap="round"/></svg></span><span style="font-size:9.5px;font-weight:600;color:#A89D8E">很好</span></div>
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><span style="width:38px;height:38px;border-radius:50%;background:#EDF0EA;border:2px solid #A8B5A2;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.5" cy="10" r="1.4" fill="#5E7257"/><circle cx="15.5" cy="10" r="1.4" fill="#5E7257"/><path d="M8.2 15q3.8 -1.6 7.6 0" stroke="#5E7257" stroke-width="1.7" stroke-linecap="round"/></svg></span><span style="font-size:9.5px;font-weight:800;color:#5E7257">不错</span></div>
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><span style="width:38px;height:38px;border-radius:50%;background:#fff;border:1.5px solid #ECE6DC;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.5" cy="10" r="1.3" fill="#B0A695"/><circle cx="15.5" cy="10" r="1.3" fill="#B0A695"/><path d="M8.3 15h7.4" stroke="#B0A695" stroke-width="1.6" stroke-linecap="round"/></svg></span><span style="font-size:9.5px;font-weight:600;color:#A89D8E">一般</span></div>
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><span style="width:38px;height:38px;border-radius:50%;background:#fff;border:1.5px solid #ECE6DC;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.5" cy="10.5" r="1.3" fill="#B0A695"/><circle cx="15.5" cy="10.5" r="1.3" fill="#B0A695"/><path d="M8 15.5q4 -2.5 8 0" stroke="#B0A695" stroke-width="1.6" stroke-linecap="round" transform="rotate(180 12 14.5)"/></svg></span><span style="font-size:9.5px;font-weight:600;color:#A89D8E">低落</span></div>
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><span style="width:38px;height:38px;border-radius:50%;background:#fff;border:1.5px solid #ECE6DC;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M7.5 10.5l2-1M16.5 10.5l-2-1" stroke="#B0A695" stroke-width="1.5" stroke-linecap="round"/><path d="M8 16q4 -2.5 8 0" stroke="#B0A695" stroke-width="1.6" stroke-linecap="round" transform="rotate(180 12 15)"/></svg></span><span style="font-size:9.5px;font-weight:600;color:#A89D8E">糟糕</span></div>
              </div>
            </div>

            <!-- 天气 -->
            <div style="display:flex;flex-direction:column;gap:7px;flex:none">
              <span style="font-size:10.5px;font-weight:800;letter-spacing:.1em;color:#B3A998">天气</span>
              <div style="display:flex;gap:7px">
                <span style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:#F4EFE0;border:2px solid #C2B49C;color:#897B5E;font-size:12px;font-weight:800;padding:8px 0;border-radius:12px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" fill="#C2B49C"/><g stroke="#C2B49C" stroke-width="1.8" stroke-linecap="round"><path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/></g></svg>晴</span>
                <span style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:#fff;border:1.5px solid #ECE6DC;color:#8C8275;font-size:12px;font-weight:700;padding:8px 0;border-radius:12px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M7 17h9a3.5 3.5 0 0 0 .3-6.98A5 5 0 0 0 6.5 11 3 3 0 0 0 7 17z" fill="#C3BBAC"/></svg>多云</span>
                <span style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:#fff;border:1.5px solid #ECE6DC;color:#8C8275;font-size:12px;font-weight:700;padding:8px 0;border-radius:12px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M7 14h9a3.3 3.3 0 0 0 .3-6.6A4.8 4.8 0 0 0 6.6 8 2.9 2.9 0 0 0 7 14z" fill="#9FB0BE"/><g stroke="#9FB0BE" stroke-width="1.7" stroke-linecap="round"><path d="M9 17l-1 3M13 17l-1 3M17 17l-1 3"/></g></svg>雨</span>
                <span style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:#fff;border:1.5px solid #ECE6DC;color:#8C8275;font-size:12px;font-weight:700;padding:8px 0;border-radius:12px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M7 13h9a3.3 3.3 0 0 0 .3-6.6A4.8 4.8 0 0 0 6.6 7 2.9 2.9 0 0 0 7 13z" fill="#CFD6DC"/><g fill="#9FB0BE"><circle cx="9" cy="18" r="1.1"/><circle cx="13" cy="19.5" r="1.1"/><circle cx="16" cy="18" r="1.1"/></g></svg>雪</span>
              </div>
            </div>

            <div style="background:#A8B5A2;border-radius:15px;padding:14px;text-align:center;box-shadow:0 8px 20px rgba(168,181,162,.42);flex:none;margin-top:1px"><span style="font-size:15px;font-weight:800;color:#fff;letter-spacing:.08em">记 下 来</span></div>
          </div>
        </div>
        <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:108px;height:4px;border-radius:999px;background:rgba(74,69,64,.16);z-index:6"></div>
      </div>
    </div>

    <!-- 2 · 添加完成 -->
    <div style="display:flex;flex-direction:column;gap:13px;flex:none">
      <span style="font-size:12px;font-weight:700;color:#9A9081;letter-spacing:.03em;padding-left:8px">添加完成</span>
      <div style="width:300px;height:624px;background:#F6F3EC;border-radius:42px;box-shadow:0 22px 50px rgba(74,69,64,.16),0 6px 16px rgba(74,69,64,.06);overflow:hidden;position:relative;display:flex;flex-direction:column;flex:none;border:6px solid #fff;outline:1px solid rgba(120,110,100,.1)">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 22px 4px;flex:none">
          <span style="font-size:13px;font-weight:800;color:#4A4540">9:41</span>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="display:flex;align-items:flex-end;gap:1.5px;height:9px"><div style="width:2.5px;height:4px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:6px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:8px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:9px;background:#4A4540;border-radius:1px"></div></div>
            <div style="width:18px;height:9px;border:1px solid rgba(74,69,64,.5);border-radius:2px;padding:1px"><div style="width:70%;height:100%;background:#4A4540;border-radius:1px"></div></div>
          </div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 30px;gap:22px">
          <div style="width:84px;height:84px;border-radius:50%;background:#E9EEE6;display:flex;align-items:center;justify-content:center"><div style="width:60px;height:60px;border-radius:50%;background:#A8B5A2;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(168,181,162,.5)"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:7px">
            <span style="font-size:21px;font-weight:800;color:#4A4540">记录完成</span>
            <span style="font-size:13px;font-weight:500;color:#9A9081;text-align:center;line-height:1.6">今天已记录 7 件事，<br>继续保持这份用心。</span>
          </div>
          <div style="width:100%;background:#fff;border-radius:18px;padding:15px 16px;box-shadow:0 3px 12px rgba(74,69,64,.05);display:flex;flex-direction:column;gap:11px">
            <span style="font-size:14px;font-weight:700;color:#4A4540;line-height:1.4">午后散步，晒到太阳很舒服</span>
            <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
              <span style="display:inline-flex;align-items:center;gap:5px;background:#E9EEE6;color:#5E7257;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px"><span style="width:6px;height:6px;border-radius:50%;background:#A8B5A2"></span>生活</span>
              <span style="display:inline-flex;align-items:center;gap:4px;background:#F2EEE5;color:#8C8275;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><circle cx="8.5" cy="10" r="1.6" fill="#8C8275"/><circle cx="15.5" cy="10" r="1.6" fill="#8C8275"/><path d="M8.2 15q3.8 -1.6 7.6 0" stroke="#8C8275" stroke-width="1.9" stroke-linecap="round"/></svg>不错</span>
              <span style="display:inline-flex;align-items:center;gap:4px;background:#F2EEE5;color:#8C8275;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" fill="#8C8275"/></svg>晴</span>
              <span style="font-size:10.5px;font-weight:600;color:#B3A998;margin-left:auto">14:30</span>
            </div>
          </div>
          <span style="font-size:13px;font-weight:800;color:#A8B5A2">返回时间轴</span>
        </div>
        <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:108px;height:4px;border-radius:999px;background:rgba(74,69,64,.16)"></div>
      </div>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
