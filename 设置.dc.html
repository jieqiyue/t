<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</helmet>

<div style="width:max-content;min-width:100%;min-height:100vh;box-sizing:border-box;padding:48px;background:#E7E3DA;font-family:'Nunito','Noto Sans SC',-apple-system,sans-serif">

  <div style="max-width:600px;margin:0 auto 30px">
    <div style="font-size:12px;font-weight:800;letter-spacing:.22em;color:#B3A998;margin-bottom:8px">DAILY ACTIVITY LOG · 设置</div>
    <h1 style="margin:0 0 8px;font-size:30px;font-weight:800;color:#4A4540;letter-spacing:-.01em">设置</h1>
    <p style="margin:0;font-size:14px;color:#8C8275;font-weight:500">切换「全部活动」的展示视图，以及全局色调。</p>
  </div>

  <div style="display:flex;gap:36px;align-items:flex-start;margin:0 auto;max-width:600px">
    <div style="display:flex;flex-direction:column;gap:13px;flex:none">
      <span style="font-size:12px;font-weight:700;color:#9A9081;letter-spacing:.03em;padding-left:8px">设置</span>
      <div style="width:300px;height:624px;background:#F6F3EC;border-radius:42px;box-shadow:0 22px 50px rgba(74,69,64,.16),0 6px 16px rgba(74,69,64,.06);overflow:hidden;position:relative;display:flex;flex-direction:column;flex:none;border:6px solid #fff;outline:1px solid rgba(120,110,100,.1)">

        <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 22px 4px;flex:none">
          <span style="font-size:13px;font-weight:800;color:#4A4540">9:41</span>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="display:flex;align-items:flex-end;gap:1.5px;height:9px"><div style="width:2.5px;height:4px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:6px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:8px;background:#4A4540;border-radius:1px"></div><div style="width:2.5px;height:9px;background:#4A4540;border-radius:1px"></div></div>
            <div style="width:18px;height:9px;border:1px solid rgba(74,69,64,.5);border-radius:2px;padding:1px"><div style="width:70%;height:100%;background:#4A4540;border-radius:1px"></div></div>
          </div>
        </div>

        <div style="flex:1;overflow:hidden;padding:6px 20px 0;display:flex;flex-direction:column;gap:22px">
          <div style="display:flex;align-items:center;gap:10px;padding-top:2px">
            <div style="width:30px;height:30px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(74,69,64,.06);display:flex;align-items:center;justify-content:center;flex:none"><span style="font-size:17px;color:#8C8275;margin-top:-2px">‹</span></div>
            <span style="font-size:22px;font-weight:800;color:#4A4540;line-height:1.1">设置</span>
          </div>

          <!-- 全部活动视图 -->
          <div style="display:flex;flex-direction:column;gap:11px">
            <span style="font-size:11px;font-weight:800;letter-spacing:.12em;color:#B3A998;padding-left:2px">全部活动视图</span>
            <div style="display:flex;gap:11px">
              <div style="flex:1;background:#fff;border-radius:16px;padding:13px 13px 12px;border:2px solid #A8B5A2;box-shadow:0 3px 12px rgba(74,69,64,.05);display:flex;flex-direction:column;gap:11px;position:relative">
                <div style="position:absolute;top:11px;right:11px;width:18px;height:18px;border-radius:50%;background:#A8B5A2;display:flex;align-items:center;justify-content:center"><span style="color:#fff;font-size:11px;font-weight:800;line-height:1">✓</span></div>
                <div style="display:flex;flex-direction:column;gap:5px;padding-top:4px">
                  <div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;border-radius:50%;background:#9FB0BE"></div><div style="flex:1;height:7px;border-radius:4px;background:#ECE6DC;overflow:hidden"><div style="width:100%;height:100%;background:#9FB0BE;border-radius:4px"></div></div></div>
                  <div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;border-radius:50%;background:#A8B5A2"></div><div style="flex:1;height:7px;border-radius:4px;background:#ECE6DC;overflow:hidden"><div style="width:72%;height:100%;background:#A8B5A2;border-radius:4px"></div></div></div>
                  <div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;border-radius:50%;background:#C9A9A0"></div><div style="flex:1;height:7px;border-radius:4px;background:#ECE6DC;overflow:hidden"><div style="width:40%;height:100%;background:#C9A9A0;border-radius:4px"></div></div></div>
                </div>
                <div style="display:flex;flex-direction:column;gap:1px"><span style="font-size:13.5px;font-weight:800;color:#4A4540">频次榜</span><span style="font-size:10.5px;font-weight:600;color:#A89D8E">排行条形</span></div>
              </div>
              <div style="flex:1;background:#fff;border-radius:16px;padding:13px 13px 12px;border:1.5px solid #ECE6DC;display:flex;flex-direction:column;gap:11px;position:relative">
                <div style="position:absolute;top:11px;right:11px;width:18px;height:18px;border-radius:50%;border:1.5px solid #DDD5C8"></div>
                <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding-top:4px;min-height:36px;align-content:center">
                  <div style="width:26px;height:26px;border-radius:50%;background:#9FB0BE"></div>
                  <div style="width:21px;height:21px;border-radius:50%;background:#A8B5A2"></div>
                  <div style="width:16px;height:16px;border-radius:50%;background:#C2B49C"></div>
                  <div style="width:14px;height:14px;border-radius:50%;background:#C9A9A0"></div>
                </div>
                <div style="display:flex;flex-direction:column;gap:1px"><span style="font-size:13.5px;font-weight:800;color:#4A4540">活动云</span><span style="font-size:10.5px;font-weight:600;color:#A89D8E">气泡大小</span></div>
              </div>
            </div>
          </div>

          <!-- 色调 -->
          <div style="display:flex;flex-direction:column;gap:11px">
            <span style="font-size:11px;font-weight:800;letter-spacing:.12em;color:#B3A998;padding-left:2px">色调</span>
            <div style="display:flex;gap:10px">
              <div style="flex:1;display:flex;flex-direction:column;gap:7px;align-items:center">
                <div style="width:100%;aspect-ratio:1;border-radius:15px;background:#F1ECE2;border:2.5px solid #4A4540;display:flex;align-items:center;justify-content:center"><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#9FB0BE"></div><div style="width:11px;height:11px;border-radius:50%;background:#A8B5A2"></div><div style="width:11px;height:11px;border-radius:50%;background:#C9A9A0"></div><div style="width:11px;height:11px;border-radius:50%;background:#C2B49C"></div></div></div>
                <span style="font-size:10.5px;font-weight:800;color:#4A4540">奶白</span>
              </div>
              <div style="flex:1;display:flex;flex-direction:column;gap:7px;align-items:center">
                <div style="width:100%;aspect-ratio:1;border-radius:15px;background:#EFF0F3;border:1.5px solid #ECE6DC;display:flex;align-items:center;justify-content:center"><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#8AA0B8"></div><div style="width:11px;height:11px;border-radius:50%;background:#8FB0A4"></div><div style="width:11px;height:11px;border-radius:50%;background:#C39A93"></div><div style="width:11px;height:11px;border-radius:50%;background:#A6A0BC"></div></div></div>
                <span style="font-size:10.5px;font-weight:700;color:#8C8275">暮山黛</span>
              </div>
              <div style="flex:1;display:flex;flex-direction:column;gap:7px;align-items:center">
                <div style="width:100%;aspect-ratio:1;border-radius:15px;background:#F6F0E7;border:1.5px solid #ECE6DC;display:flex;align-items:center;justify-content:center"><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#B98C6D"></div><div style="width:11px;height:11px;border-radius:50%;background:#A3A878"></div><div style="width:11px;height:11px;border-radius:50%;background:#C77B5E"></div><div style="width:11px;height:11px;border-radius:50%;background:#CBA869"></div></div></div>
                <span style="font-size:10.5px;font-weight:700;color:#8C8275">焦糖陶</span>
              </div>
              <div style="flex:1;display:flex;flex-direction:column;gap:7px;align-items:center">
                <div style="width:100%;aspect-ratio:1;border-radius:15px;background:#211F29;border:1.5px solid #ECE6DC;display:flex;align-items:center;justify-content:center"><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#6E8FB8"></div><div style="width:11px;height:11px;border-radius:50%;background:#6FB0A0"></div><div style="width:11px;height:11px;border-radius:50%;background:#C98A86"></div><div style="width:11px;height:11px;border-radius:50%;background:#BFA3DE"></div></div></div>
                <span style="font-size:10.5px;font-weight:700;color:#8C8275">夜墨霓</span>
              </div>
            </div>
          </div>

          <!-- 预览条 -->
          <div style="background:#fff;border-radius:16px;padding:14px 15px;box-shadow:0 3px 12px rgba(74,69,64,.05);display:flex;align-items:center;gap:12px">
            <div style="display:flex;flex-direction:column;gap:2px;flex:1">
              <span style="font-size:12.5px;font-weight:800;color:#4A4540">当前：奶白 · 频次榜</span>
              <span style="font-size:10.5px;font-weight:600;color:#A89D8E">更改后立即应用到全部页面</span>
            </div>
            <div style="display:flex;gap:5px">
              <div style="width:11px;height:11px;border-radius:50%;background:#9FB0BE"></div>
              <div style="width:11px;height:11px;border-radius:50%;background:#A8B5A2"></div>
              <div style="width:11px;height:11px;border-radius:50%;background:#C9A9A0"></div>
              <div style="width:11px;height:11px;border-radius:50%;background:#C2B49C"></div>
            </div>
          </div>
        </div>

        <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:108px;height:4px;border-radius:999px;background:rgba(74,69,64,.16)"></div>
      </div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
